services:
  postgres-demo:
    image: postgres:18-alpine
    container_name: postgres_isis_demo
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: demo_pass
      POSTGRES_DB: landing-page-isis-demo-db
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d landing-page-isis-demo-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - landing-page-isis_default

  app-demo:
    build:
      context: .
      dockerfile: landing-page-isis/Dockerfile
    container_name: landing_page_app_demo
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres-demo;Database=landing-page-isis-demo-db;Username=postgres;Password=demo_pass
      - ENCRYPTION_KEY=01234567890123456789012345678901
      - ADMIN_EMAIL=admin@demo.com
      - ADMIN_PASSWORD=Demo@123
      - ADMIN_NAME=Gestor
    depends_on:
      postgres-demo:
        condition: service_healthy
    networks:
      - landing-page-isis_default

networks:
  landing-page-isis_default:
    external: true
